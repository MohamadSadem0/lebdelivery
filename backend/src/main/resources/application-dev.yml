spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.lebanonplatform: DEBUG
    org.hibernate.SQL: DEBUG

app:
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:dev_access_secret_replace_before_production_32_chars}
    refresh-secret: ${JWT_REFRESH_SECRET:dev_refresh_secret_replace_before_production_32_chars}
